<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSBA Gym Jam 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #090e1c;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .logo-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  .logo-gymjam-main {
    height: 110px;
    width: auto;
    border-radius: 12px;
    filter: drop-shadow(0 0 16px rgba(123,47,190,0.6));
  }
  .logo-gymjam {
    height: 80px;
    width: auto;
    border-radius: 10px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 10vw, 56px);
    color: #f5a623;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
  }
  .sub {
    font-family: 'DM Mono', monospace;
    color: #5a7090;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
    text-align: center;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }
  .card {
    background: #162030;
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 12px;
    padding: 28px 24px;
    text-align: center;
    text-decoration: none;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(245,166,35,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .card:hover {
    border-color: #f5a623;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(245,166,35,0.15);
  }
  .card-badge {
    display: inline-block;
    background: #f5a623;
    color: #090e1c;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 12px;
    border-radius: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .card-badge.soon {
    background: #1d2a3f;
    color: #5a7090;
    border: 1px solid rgba(90,112,144,0.3);
  }
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: #fff;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  .card-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #5a7090;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .card-meta {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .card-meta span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #5a7090;
    letter-spacing: 1px;
  }
  .card-meta span strong {
    color: #f5a623;
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
  }
  .card.coming {
    opacity: 0.45;
    pointer-events: none;
  }
  .footer {
    margin-top: 40px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #2d3f55;
    letter-spacing: 1.5px;
    text-align: center;
    text-transform: uppercase;
  }
</style>
</head>
